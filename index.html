<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#F7F3F0">
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <title>Adriana Coiffeur</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Inclusive+Sans:ital,wght@0,400..700;1,400..700&family=Inter:wght@300;400;500;600;700;800&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#BD9D8A", // Warm Brown
                        "primary-dark": "#343863", // Navy Blue
                        "background-light": "#F7F3F0", // Beige
                        "background-dark": "#0A0A0A", // Midnight Onyx
                        "surface-dark": "#161616", // Deep Charcoal
                        "surface-light": "#ffffff",
                        "brand-copper": "#a38779",
                        "brand-cream": "#f7f4ec",
                        "accent-gold": "#fbbf24"
                    },
                    fontFamily: {
                        "display": ["'Inter'", "sans-serif"],
                        "sans": ["'Inter'", "sans-serif"],
                        "serif": ["'Cormorant Garamond'", "serif"],
                        "script": ["'Alex Brush'", "cursive"]
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Luxury Effects */
        .glass-effect {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .dark .glass-effect {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .premium-glow {
            box-shadow: 0 0 20px rgba(189, 157, 138, 0.1);
            transition: box-shadow 0.3s ease;
        }

        .premium-glow:hover {
            box-shadow: 0 0 30px rgba(189, 157, 138, 0.2);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        @keyframes shimmer {
          0% { background-position: -200% 0; }
          100% { background-position: 200% 0; }
        }

        .animate-shimmer {
          background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
          background-size: 200% 100%;
          animation: shimmer 2s infinite;
        }
        
        .hatched-red {
          background-image: repeating-linear-gradient(
            45deg,
            rgba(239, 68, 68, 0.15),
            rgba(239, 68, 68, 0.15) 10px,
            rgba(239, 68, 68, 0.25) 10px,
            rgba(239, 68, 68, 0.25) 20px
          );
          border-left: 4px solid #ef4444;
        }

        @media screen and (max-width: 768px) {
            input, select, textarea {
                font-size: 16px !important;
            }
        }
    </style>
    <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
